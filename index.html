<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Radio Player</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .player-container {
            background: #1e1e1e;
            width: 100%;
            max-width: 450px;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
        }

        .main-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #1db954;
        }

        .status-bar {
            font-size: 14px;
            color: #b3b3b3;
            margin-bottom: 25px;
            background: #282828;
            padding: 8px 15px;
            border-radius: 30px;
            display: inline-block;
        }

        /* ระบบ Grid สำหรับปุ่มช่องวิทยุ */
        .station-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        /* ดีไซน์ปุ่มช่องวิทยุให้ใหญ่และกดง่าย */
        .station-btn {
            background: #282828;
            border: 2px solid #404040;
            color: white;
            padding: 20px 10px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .station-btn .icon {
            font-size: 32px;
        }

        .station-btn:active {
            transform: scale(0.95);
        }

        /* สถานะเมื่อช่องนั้นกำลังเล่นอยู่ */
        .station-btn.active {
            background: #1db954;
            border-color: #1db954;
            color: black;
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.4);
        }

        /* ปุ่มหยุดหลัก */
        .stop-btn {
            background: #e91429;
            border: none;
            color: white;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            display: none; /* ซ่อนไว้ก่อน จะแสดงเมื่อมีเพลงเล่น */
            box-shadow: 0 4px 12px rgba(233, 20, 41, 0.3);
        }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #b3b3b3;
            background: #282828;
            padding: 12px;
            border-radius: 15px;
        }

        .volume-slider {
            width: 75%;
            accent-color: #1db954;
            cursor: pointer;
        }
