<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Radio Player & OneDrive</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .player-container {
            background: #1e1e1e;
            width: 100%;
            max-width: 450px;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            position: relative;
        }

        .main-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #1db954;
        }

        .status-bar {
            font-size: 14px;
            color: #b3b3b3;
            margin-bottom: 25px;
            background: #282828;
            padding: 8px 15px;
            border-radius: 30px;
            display: inline-block;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .station-btn {
            background: #282828;
            border: 2px solid #404040;
            color: white;
            padding: 18px 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .station-btn:nth-child(5) {
            grid-column: span 2;
        }

        .station-btn .icon {
            font-size: 26px;
        }

        .station-btn:active {
            transform: scale(0.95);
        }

        .station-btn.active {
            background: #1db954;
            border-color: #1db954;
            color: black;
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.4);
        }

        .stop-btn {
            background: #e91429;
            border: none;
            color: white;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            display: none;
            box-shadow: 0 4px 12px rgba(233, 20, 41, 0.3);
        }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #b3b3b3;
            background: #282828;
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .volume-slider {
            width: 75%;
            accent-color: #1db954;
            cursor: pointer;
        }

        .onedrive-section {
            border-top: 2px dashed #404040;
            padding-top: 25px;
            text-align: left;
            margin-bottom: 15px;
        }

        .onedrive-title {
            font-size: 18px;
            font-weight: bold;
            color: #0078d4;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .onedrive-btn {
            background: #282828;
            border: 2px solid #0078d4;
            border-radius: 15px;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(0, 120, 212, 0.15);
        }

        .onedrive-btn:active {
            transform: scale(0.98);
            background: #222222;
        }

        .onedrive-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .onedrive-name {
            font-size: 16px;
            font-weight: bold;
        }

        .onedrive-desc {
            font-size: 12px;
            color: #b3b3b3;
        }

        .onedrive-icon {
            font-size: 22px;
            background: #0078d4;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 120, 212, 0.3);
        }

        .version-tag {
            text-align: right;
            font-size: 11px;
            color: #555555;
            font-family: monospace;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="main-title">🎵 วิทยุออนไลน์มือถือ</div>
    <div class="status-bar" id="status-text">เลือกช่องที่ต้องการฟังได้เลยครับ</div>

    <div class="station-grid">
        <button class="station-btn" data-url="https://atimehd.smartclick.co.th/greenwave/hls/greenwave.m3u8" data-name="Greenwave 106.5">
            <span class="icon">🌿</span>
            <span>Greenwave 106.5</span>
        </button>

        <button class="station-btn" data-url="http://radio11.plathong.net:7590/;stream.mp3" data-ssl-url="https://cors-proxy.htmldriven.com/?url=http://radio11.plathong.net:7590/;stream.mp3" data-name="Chula 101.5">
            <span class="icon">🎓</span>
            <span>Chula 101.5</span>
        </button>
        
        <button class="station-btn" data-url="https://radio.mcot.net/fm965" data-name="MCOT FM 96.5">
            <span class="icon">🎙️</span>
            <span>FM 96.5</span>
        </button>

        <button class="station-btn" data-url="https://radio.mcot.net/fm1005" data-name="MCOT FM 100.5">
            <span class="icon">📰</span>
            <span>FM 100.5</span>
        </button>

        <button class="station-btn" data-url="https://becteroradio.cdn.byteark.com/smooth-audio" data-name="Smooth 105.5">
            <span class="icon">🎷</span>
            <span>Smooth 105.5</span>
        </button>
    </div>

    <button class="stop-btn" id="main-stop-btn">หยุดเล่น (STOP)</button>

    <div class="volume-container">
        <span>🔈</span>
        <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.01" value="0.8">
        <span>🔊</span>
    </div>

    <div class="onedrive-section">
        <div class="onedrive-title">☁️ คลังดาวน์โหลด OneDrive</div>
        <a href="https://1drv.ms/f/c/1bfbd4d607a08bfc/IgDBzv-3ynJZSJWY9hfRRLc7AUM0NtJlePb7ie8RICf2Dto?e=ZXY86m" target="_blank" class="onedrive-btn">
            <div class="onedrive-info">
                <span class="onedrive-name">📂 เปิดโฟลเดอร์ดาวน์โหลดไฟล์</span>
                <span class="onedrive-desc">รวมไฟล์เอกสารและเพลงที่แชร์ไว้</span>
            </div>
            <div class="onedrive-icon">🚀</div>
        </a>
    </div>

    <div class="version-tag">V.20260522-04</div>
</div>

<audio id="audio-player" preload="none" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('audio-player');
    const statusText = document.getElementById('status-text');
    const mainStopBtn = document.getElementById('main-stop-btn');
    const volumeSlider = document.getElementById('volume');
    const buttons = document.querySelectorAll('.station-btn');
    
    let currentBtn = null;
    let hls = null;

    buttons.forEach(button => {
        button.addEventListener('click', function() {
            let url = this.getAttribute('data-url');
            const sslUrl = this.getAttribute('data-ssl-url');
            const name = this.getAttribute('data-name');

            // ตรวจจับระบบหลังบ้าน: ถ้าทำงานบนหน้าเว็บ https:// (เช่น GitHub) และมีลิงก์สำรอง ให้เปลี่ยนไปใช้ลิงก์สำรองทันที
            if (window.location.protocol === 'https:' && sslUrl) {
                url = sslUrl;
            }

            if (currentBtn) {
                currentBtn.classList.remove('active');
            }

            currentBtn = this;
            currentBtn.classList.add('active');

            statusText.textContent = `กำลังเชื่อมต่อ ${name}...`;
            mainStopBtn.style.display = "block";

            audio.pause();
            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(audio);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        triggerPlay(name);
                    });
                } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
                    audio.src = url;
                    triggerPlay(name);
                }
            } else {
                audio.src = url;
                audio.load();
                triggerPlay(name);
            }
        });
    });

    function triggerPlay(name) {
        audio.play()
            .then(() => {
                statusText.textContent = `● กำลังฟัง: ${name}`;
            })
            .catch(error => {
                console.error("Error:", error);
                statusText.textContent = "สัญญาณขัดข้อง หรือถูกเบราว์เซอร์บล็อก";
            });
    }

    mainStopBtn.addEventListener('click', stopRadio);

    function stopRadio() {
        audio.pause();
        audio.src = ""; 
        if (hls) {
            hls.destroy();
            hls = null;
        }
        if (currentBtn) {
            currentBtn.classList.remove('active');
            currentBtn = null;
        }
        mainStopBtn.style.display = "none";
        statusText.textContent = "หยุดทำงาน - เลือกช่องเพื่อฟังต่อ";
    }

    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });
</script>

</body>
</html>
